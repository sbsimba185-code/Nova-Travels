
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcel App</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header {
  background: linear-gradient(90deg,#ff7a18,#ffb347);
  padding:15px;
  text-align:center;
  font-weight:bold;
  border-radius:0 0 15px 15px;
}

/* STATS */
.stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}
.card {
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* FORM */
.form {
  padding:10px;
}
input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
button {
  width:100%;
  padding:12px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  background:#ff7a18;
  color:white;
  font-weight:bold;
}

/* RECORD CARD */
.record {
  background:white;
  color:black;
  margin:10px;
  padding:12px;
  border-radius:10px;
}
.row {
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}
.actions button {
  width:30%;
  margin:5px 1%;
}
</style>
</head>

<body>

<div class="header">📦 Parcel Record System</div>

<!-- STATS -->
<div class="stats">
  <div class="card">Total<br><span id="total">0</span></div>
  <div class="card">Recorded<br><span id="rec">0</span></div>
  <div class="card">Pending<br><span id="pend">0</span></div>
  <div class="card">₹<span id="amt">0</span></div>
</div>

<!-- FORM -->
<div class="form">
  <input type="date" id="date">
  <input placeholder="LR No" id="lr">
  <select id="type">
    <option>Delivery</option>
    <option>Booking</option>
  </select>
  <input placeholder="From" id="from">
  <input placeholder="To" id="to">
  <input placeholder="Qty" id="qty">
  <input placeholder="Amount" id="amount">

  <button onclick="addRecord()">Save</button>
  <button onclick="toggleSearch()">Search</button>
</div>

<!-- SEARCH -->
<div class="form" id="searchBox" style="display:none;">
  <input type="date" id="s_date">
  <input placeholder="LR" id="s_lr">
  <input placeholder="From" id="s_from">
  <input placeholder="To" id="s_to">
  <select id="s_recorded">
    <option value="">All</option>
    <option value="true">Recorded</option>
    <option value="false">Pending</option>
  </select>
  <button onclick="loadRecords()">Apply Filter</button>
</div>

<!-- RECORDS -->
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBMMZe-WtcdFCouYkqLa3o4JEL2H3rPAX8",
  authDomain: "nova-8033b.firebaseapp.com",
  projectId: "nova-8033b"
});

const db = getFirestore(app);

// TOGGLE SEARCH
window.toggleSearch = () => {
  const box = document.getElementById("searchBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
};

// ADD
window.addRecord = async () => {
  const data = {
    date: date.value,
    lr: lr.value,
    type: type.value,
    from: from.value,
    to: to.value,
    qty: Number(qty.value),
    amount: Number(amount.value),
    recorded: false,
    enteredDate: ""
  };

  if(!data.lr || !data.date) return alert("Date & LR required");

  const snap = await getDocs(collection(db,"records"));
  let duplicate=false;

  snap.forEach(d=>{
    const r=d.data();
    if(JSON.stringify(r)===JSON.stringify(data)) duplicate=true;
  });

  if(duplicate) return alert("Duplicate entry");

  await addDoc(collection(db,"records"), data);
  loadRecords();
};

// LOAD
window.loadRecords = async () => {
  const list = document.getElementById("list");
  list.innerHTML="";

  let total=0, rec=0, amt=0;

  const snap = await getDocs(collection(db,"records"));

  snap.forEach(docSnap=>{
    const r = docSnap.data();

    if(s_date.value && r.date!==s_date.value) return;
    if(s_lr.value && !r.lr.includes(s_lr.value)) return;
    if(s_from.value && !r.from.includes(s_from.value)) return;
    if(s_to.value && !r.to.includes(s_to.value)) return;
    if(s_recorded.value && String(r.recorded)!==s_recorded.value) return;

    total++;
    if(r.recorded) rec++;
    amt += r.amount;

    list.innerHTML += `
<div class="record">
  <div class="row"><b>${r.date}</b> LR: ${r.lr}</div>
  <div>${r.type} | ${r.from} → ${r.to}</div>
  <div>Qty: ${r.qty} | ₹${r.amount}</div>

  <div style="font-size:12px; color:gray;">
    ${r.recorded && r.enteredDate ? "Recorded on: " + r.enteredDate : ""}
  </div>

  <div class="actions">
    <button onclick="toggle('${docSnap.id}', ${r.recorded})">
      ${r.recorded ? "Recorded" : "Pending"}
    </button>
    <button onclick="edit('${docSnap.id}')">Edit</button>
    <button onclick="del('${docSnap.id}')">Delete</button>
  </div>
</div>
`;
  });

  totalRecords(total, rec, amt);
};

// STATS
function totalRecords(t,r,a){
  total.innerText=t;
  rec.innerText=r;
  pend.innerText=t-r;
  amt.innerText=a;
}

// TOGGLE
window.toggle = async (id, val) => {
  const newStatus = !val;

  await updateDoc(doc(db, "records", id), {
    recorded: newStatus,
    enteredDate: newStatus 
      ? new Date().toLocaleString()  // readable date
      : ""
  });

  loadRecords();
};

// DELETE
window.del = async (id)=>{
  await deleteDoc(doc(db,"records",id));
  loadRecords();
};

// EDIT
window.edit = async (id) => {
  const docRef = doc(db, "records", id);

  // Get current data
  const snap = await getDocs(collection(db, "records"));
  let record = null;

  snap.forEach(d => {
    if (d.id === id) record = d.data();
  });

  if (!record) return alert("Record not found");

  let updated = { ...record };

  while (true) {
    let field = prompt(
`Select field to edit:

1. date
2. lr
3. type
4. from
5. to
6. qty
7. amount
8. recorded

Type field name exactly:`
    );

    if (!field) break;

    field = field.toLowerCase();

    if (!updated.hasOwnProperty(field)) {
      alert("Invalid field!");
      continue;
    }

    let newValue = prompt(`Enter new value for ${field}`, updated[field]);

    if (newValue === null) continue;

    // Type handling
    if (field === "qty" || field === "amount") {
      newValue = Number(newValue);
    }

    if (field === "recorded") {
      newValue = newValue === "true";
    }

    updated[field] = newValue;

    let more = confirm("Edit more fields?");
    if (!more) break;
  }

  await updateDoc(docRef, updated);
  alert("Updated successfully ✅");
  loadRecords();
};

loadRecords();
</script>

</body>
  </html>
